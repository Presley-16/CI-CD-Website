name: CI/CD Pipeline

# Workflow triggers
on:
  push:
    branches:
      - main
    paths:
      - '*.html'
      - '*.css'
      - '*.js'
      - '.github/workflows/*.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Manual trigger

# Environment variables
env:
  NODE_VERSION: '18'

jobs:
  # Job 1: Validate HTML
  validate-html:
    name: HTML Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install HTML validator
        run: npm install -g html-validate
      
      - name: Create validation config
        run: |
          cat > .htmlvalidate.json << 'EOF'
          {
            "extends": ["html-validate:recommended"],
            "rules": {
              "no-inline-style": "off",
              "require-sri": "off"
            }
          }
          EOF
      
      - name: Validate HTML files
        run: html-validate "*.html"
      
      - name: Upload HTML validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-validation-results
          path: |
            *.html
          retention-days: 7

  # Job 2: Validate CSS
  validate-css:
    name: CSS Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install CSS validator
        run: npm install -g stylelint stylelint-config-standard
      
      - name: Create Stylelint config
        run: |
          cat > .stylelintrc.json << 'EOF'
          {
            "extends": "stylelint-config-standard",
            "rules": {
              "selector-class-pattern": null,
              "custom-property-pattern": null
            }
          }
          EOF
      
      - name: Validate CSS files
        run: stylelint "*.css"
      
      - name: Upload CSS validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: css-validation-results
          path: |
            *.css
          retention-days: 7

  # Job 3: Lint JavaScript
  lint-javascript:
    name: JavaScript Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install ESLint
        run: npm install -g eslint
      
      - name: Create ESLint config
        run: |
          cat > .eslintrc.json << 'EOF'
          {
            "env": {
              "browser": true,
              "es2021": true
            },
            "extends": "eslint:recommended",
            "parserOptions": {
              "ecmaVersion": 12,
              "sourceType": "module"
            },
            "rules": {
              "no-unused-vars": "warn",
              "no-console": "off"
            }
          }
          EOF
      
      - name: Lint JavaScript files
        run: eslint "*.js" || true

  # Job 4: Test for broken links
  test-links:
    name: Link Checker
    runs-on: ubuntu-latest
    needs: [validate-html]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install link checker
        run: npm install -g broken-link-checker
      
      - name: Start simple HTTP server
        run: |
          npx http-server . -p 8080 &
          sleep 3
      
      - name: Check for broken links
        run: |
          blc http://localhost:8080 -ro --exclude linkedin.com --exclude facebook.com || true
        continue-on-error: true

  # Job 5: Security scan
  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'

  # Job 6: Build and package website
  build:
    name: Build Website
    runs-on: ubuntu-latest
    needs: [validate-html, validate-css, lint-javascript]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create build directory
        run: |
          mkdir -p build
          cp *.html build/ || true
          cp *.css build/ || true
          cp *.js build/ || true
          cp -r assets build/ 2>/dev/null || true
      
      - name: Generate build info
        run: |
          cat > build/build-info.txt << EOF
          Build Date: $(date)
          Commit SHA: ${{ github.sha }}
          Branch: ${{ github.ref_name }}
          Workflow: ${{ github.workflow }}
          EOF
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: website-build
          path: build/
          retention-days: 30
      
      - name: Display build summary
        run: |
          echo "### Build Summary :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Time:** $(date)" >> $GITHUB_STEP_SUMMARY

  # Job 7: Deploy to GitHub Pages
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build, test-links]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Display deployment info
        run: |
          echo "### Deployment Successful :tada:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at:** $(date)" >> $GITHUB_STEP_SUMMARY

  # Job 8: Performance testing (optional)
  performance-test:
    name: Performance Audit
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli
      
      - name: Start server for Lighthouse
        run: |
          npx http-server . -p 8080 &
          sleep 3
      
      - name: Run Lighthouse CI
        run: |
          lhci autorun --collect.url=http://localhost:8080 --collect.numberOfRuns=1 || true
        continue-on-error: true
